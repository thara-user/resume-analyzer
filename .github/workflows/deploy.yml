name: Deploy Resume Analyzer

on:
  push:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Test backend
        run: |
          cd backend
          pip install fastapi uvicorn pdfplumber python-multipart
          python3 -c "import main; print('Backend OK')"

  deploy-backend:
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          script: |
            cd /home/ubuntu/resume-analyzer
            git pull origin main
            sudo systemctl restart resume-api
            echo "Backend deployed!"

  deploy-frontend:
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Build frontend
        run: |
          cd frontend
          npm install
          REACT_APP_API_URL=http://65.0.4.113:8000 npm run build
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1
      - name: Deploy to S3
        run: |
          aws s3 sync frontend/build/ s3://resume-analyzer-frontend-203374879162 --delete
          echo "Frontend deployed!"
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_ID }} \
            --paths "/*"
          echo "CloudFront cleared!"
